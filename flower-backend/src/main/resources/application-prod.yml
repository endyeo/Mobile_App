storage:
  upload-dir: /home/ubuntu/app/uploads
  base-url: https://ourt.kro.kr
  oracle:
    namespace: ${ORACLE_NAMESPACE}
    bucket: ${ORACLE_BUCKET}
    region: ${ORACLE_REGION:ap-chuncheon-1}

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:no-key-set}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
  web:
    resources:
      static-locations: file:/home/ubuntu/app/uploads/,classpath:/static/
  mvc:
    static-path-pattern: /uploads/**
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
