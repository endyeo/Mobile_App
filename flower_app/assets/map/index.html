<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OurT 지도</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var kakaoKey = params.get('kakaoKey') || '';
      var tourApiKey = params.get('tourApiKey') || '';
      var embedded = params.get('embedded') === '1';

      window.MAP_CONFIG = {
        KAKAO_APP_KEY: kakaoKey,
        TOUR_API_KEY: tourApiKey,
        API_BASE_URL: params.get('apiBaseUrl') || '',
        DEFAULT_CENTER: {
          lat: Number(params.get('centerLat') || 37.5665),
          lng: Number(params.get('centerLng') || 126.9780)
        },
        DEFAULT_ZOOM_LEVEL: Number(params.get('zoom') || 5),
        DEFAULT_RADIUS: Number(params.get('radius') || 5000),
        MAX_RADIUS: Number(params.get('maxRadius') || 50000),
        DEFAULT_LIMIT: Number(params.get('limit') || 50),
        EMBEDDED: embedded
      };

      if (kakaoKey && kakaoKey !== 'YOUR_KAKAO_JS_KEY_HERE') {
        var script = document.createElement('script');
        script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey='
          + encodeURIComponent(kakaoKey) + '&libraries=services&autoload=false';
        script.onload = function () {
          if (window.kakao && window.kakao.maps) {
            window.kakao.maps.load(function () {
              document.dispatchEvent(new Event('kakao-map-ready'));
            });
          }
        };
        script.onerror = function () {
          document.dispatchEvent(new Event('kakao-map-error'));
        };
        document.head.appendChild(script);
      }
    })();
  </script>
</head>
<body>
  <main id="map-shell">
    <section id="map"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
